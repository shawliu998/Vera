name: Vera Local CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: aletheia-local-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local-validation:
    name: Local-first validation
    runs-on: macos-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install chromium

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run backend local-first checks
        working-directory: backend
        env:
          ALETHEIA_LOCAL_PACKAGE_DIR: ${{ runner.temp }}/aletheia-package-preflight
        run: |
          npm run check:aletheia:doctor
          npm run check:aletheia:backup
          npm run check:aletheia:restore
          npm run check:aletheia:privacy
          npm run check:aletheia:ops-readiness
          npm run check:aletheia:source-provenance
          npm run check:aletheia:knowledge-governance
          npm run check:aletheia:audit-workbench
          npm run check:aletheia:tool-policy
          npm run check:aletheia:approval-policy
          npm run check:aletheia:external-source-connector
          npm run check:aletheia:word-addin-manifest
          npm run check:aletheia:matter-isolation
          npm run check:aletheia:run-trace
          npm run check:aletheia:evidence
          npm run check:aletheia:audit-integrity
          npm run check:aletheia:operator
          npm run check:aletheia:legal-source-control
          npm run test:vera:legal-source-adapter
          npm run test:vera:legal-research-provider
          npm run test:vera:pkulaw-mcp-adapter
          npm run test:vera:yuandian-adapter
          npm run test:vera:legal-research-broker
          npm run test:aletheia:local
          npm run test:desktop-backup
          npm run test:aletheia:restore-drill
          npm run test:aletheia:retrieval-eval
          npm run test:aletheia:litigation-domain
          npm run test:aletheia:legal-authority-versions
          npm run test:aletheia:litigation-audit-package
          npm run test:aletheia:court-calendar-calculation
          npm run test:aletheia:deadline-rules
          npm run test:aletheia:litigation-export-integrity
          npm run test:aletheia:package
          npm run test:aletheia:completion

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Run legal-source contract tests
        working-directory: frontend
        run: npm run test:legal-sources

      - name: Run legacy compatibility UI smoke
        working-directory: frontend
        run: npm run test:aletheia:ui

  desktop-package-validation:
    name: Vera macOS package validation
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Audit desktop legal-source configuration
        run: node desktop/scripts/productRenameAudit.js

      - name: Audit macOS release readiness offline
        working-directory: desktop
        env:
          VERA_RELEASE_SIGNING: "false"
        run: |
          npm run test:signing-pipeline
          npm run signing:readiness -- --no-artifacts

      - name: Build and validate local-only Vera package
        env:
          VERA_RELEASE_SIGNING: "false"
        run: ./scripts/package-desktop-mac.sh
