services:
  backend:
    build:
      context: ./backend
    image: aletheia-backend:local
    environment:
      NODE_ENV: production
      PORT: "3001"
      ALETHEIA_BACKEND_HOST: 0.0.0.0
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DOWNLOAD_SIGNING_SECRET: ${DOWNLOAD_SIGNING_SECRET:-}
      ALETHEIA_AUTH_MODE: ${ALETHEIA_AUTH_MODE:-single_user}
      ALETHEIA_PRIVATE_AUTH_TOKEN: ${ALETHEIA_PRIVATE_AUTH_TOKEN:-}
      ALETHEIA_AUDIT_HMAC_SECRET: ${ALETHEIA_AUDIT_HMAC_SECRET:-}
      VERA_ENABLE_LEGACY_ROUTES: ${VERA_ENABLE_LEGACY_ROUTES:-false}
      VERA_ENABLE_LEGACY_RUNTIME: ${VERA_ENABLE_LEGACY_RUNTIME:-false}
      # The default is an admission-controlled compliance deployment. Do not
      # change its attestations to true until the operator has verified them.
      ALETHEIA_DEPLOYMENT_PRESET: ${ALETHEIA_DEPLOYMENT_PRESET:-compliance}
      ALETHEIA_APPLICATION_ENCRYPTION: ${ALETHEIA_APPLICATION_ENCRYPTION:-required}
      ALETHEIA_MASTER_KEY_SOURCE: ${ALETHEIA_MASTER_KEY_SOURCE:-}
      ALETHEIA_MASTER_KEY_BASE64: ${ALETHEIA_MASTER_KEY_BASE64:-}
      ALETHEIA_MASTER_KEY_FILE: ${ALETHEIA_MASTER_KEY_FILE:-}
      ALETHEIA_ALLOW_LEGACY_PLAINTEXT_READ: ${ALETHEIA_ALLOW_LEGACY_PLAINTEXT_READ:-false}
      ALETHEIA_DATABASE_ENCRYPTION: ${ALETHEIA_DATABASE_ENCRYPTION:-sqlcipher_required}
      ALETHEIA_REQUIRE_ENCRYPTED_VOLUME: ${ALETHEIA_REQUIRE_ENCRYPTED_VOLUME:-true}
      ALETHEIA_ENCRYPTED_VOLUME_ATTESTED: ${ALETHEIA_ENCRYPTED_VOLUME_ATTESTED:-false}
      ALETHEIA_AUDIT_ANCHOR_ENABLED: ${ALETHEIA_AUDIT_ANCHOR_ENABLED:-true}
      ALETHEIA_AUDIT_ANCHOR_HIGH_ASSURANCE: ${ALETHEIA_AUDIT_ANCHOR_HIGH_ASSURANCE:-true}
      ALETHEIA_AUDIT_ANCHOR_DIR: /audit-anchors/journal
      ALETHEIA_AUDIT_ANCHOR_PRIVATE_KEY_FILE: /run/aletheia-secrets/anchor-private.pem
      ALETHEIA_AUDIT_ANCHOR_PUBLIC_KEY_FILE: /run/aletheia-secrets/anchor-public.pem
      ALETHEIA_AUDIT_ANCHOR_INTERVAL_MS: ${ALETHEIA_AUDIT_ANCHOR_INTERVAL_MS:-900000}
      ALETHEIA_AUDIT_ANCHOR_EXPECTED_HEAD_HASH: ${ALETHEIA_AUDIT_ANCHOR_EXPECTED_HEAD_HASH:-}
      ALETHEIA_MALWARE_SCAN_MODE: ${ALETHEIA_MALWARE_SCAN_MODE:-required}
      ALETHEIA_CLAMAV_PATH: /usr/bin/clamscan
      ALETHEIA_CLAMAV_DATABASE_DIR: /var/lib/clamav
      ALETHEIA_DATA_DIR: /data/aletheia
      ALETHEIA_LOCAL_USER_ID: ${ALETHEIA_LOCAL_USER_ID:-local-user}
      ALETHEIA_LOCAL_USER_EMAIL: ${ALETHEIA_LOCAL_USER_EMAIL:-local@aletheia.internal}
      ALETHEIA_RETRIEVAL_MODE: keyword
      ALETHEIA_SEMANTIC_INDEX_ENABLED: "false"
      ALETHEIA_SEMANTIC_INDEX_DRIVER: disabled
      ALETHEIA_SEMANTIC_INDEX_DIR: /data/aletheia/index/semantic-local
      # Configuration and locally resolvable credential references only.
      # Provider API/MCP secrets are never injected through Compose.
      VERA_PKULAW_API_ENDPOINT: ${VERA_PKULAW_API_ENDPOINT:-}
      VERA_PKULAW_API_ALLOWED_HOSTS: ${VERA_PKULAW_API_ALLOWED_HOSTS:-}
      VERA_PKULAW_API_CREDENTIAL_REF: ${VERA_PKULAW_API_CREDENTIAL_REF:-}
      VERA_YUANDIAN_API_ENDPOINT: ${VERA_YUANDIAN_API_ENDPOINT:-}
      VERA_YUANDIAN_API_ALLOWED_HOSTS: ${VERA_YUANDIAN_API_ALLOWED_HOSTS:-}
      VERA_YUANDIAN_API_CREDENTIAL_REF: ${VERA_YUANDIAN_API_CREDENTIAL_REF:-}
      VERA_WOLTERS_API_ENDPOINT: ${VERA_WOLTERS_API_ENDPOINT:-}
      VERA_WOLTERS_API_ALLOWED_HOSTS: ${VERA_WOLTERS_API_ALLOWED_HOSTS:-}
      VERA_WOLTERS_API_CREDENTIAL_REF: ${VERA_WOLTERS_API_CREDENTIAL_REF:-}
      VERA_OFFICIAL_LEGAL_API_ENDPOINT: ${VERA_OFFICIAL_LEGAL_API_ENDPOINT:-}
      VERA_OFFICIAL_LEGAL_API_ALLOWED_HOSTS: ${VERA_OFFICIAL_LEGAL_API_ALLOWED_HOSTS:-}
      ALETHEIA_LOCAL_MODELS_JSON: ${ALETHEIA_LOCAL_MODELS_JSON:-}
      ALETHEIA_LOCAL_MODEL_ID: ${ALETHEIA_LOCAL_MODEL_ID:-}
      ALETHEIA_LOCAL_MODEL_NAME: ${ALETHEIA_LOCAL_MODEL_NAME:-}
      ALETHEIA_LOCAL_MODEL_ADAPTER: ${ALETHEIA_LOCAL_MODEL_ADAPTER:-ollama}
      ALETHEIA_LOCAL_MODEL_ENDPOINT: ${ALETHEIA_LOCAL_MODEL_ENDPOINT:-http://127.0.0.1:11434}
      ALETHEIA_LOCAL_MODEL_CONTEXT_TOKENS: ${ALETHEIA_LOCAL_MODEL_CONTEXT_TOKENS:-32768}
      ALETHEIA_LOCAL_MODEL_MAX_OUTPUT_TOKENS: ${ALETHEIA_LOCAL_MODEL_MAX_OUTPUT_TOKENS:-4096}
      ALETHEIA_LOCAL_MODEL_CONCURRENCY: ${ALETHEIA_LOCAL_MODEL_CONCURRENCY:-1}
      ALETHEIA_LOCAL_MODEL_QUEUE_LIMIT: ${ALETHEIA_LOCAL_MODEL_QUEUE_LIMIT:-16}
      ALETHEIA_LOCAL_MODEL_AUTOSTART: ${ALETHEIA_LOCAL_MODEL_AUTOSTART:-false}
      ALETHEIA_LOCAL_MODEL_EXECUTABLE_ALLOWLIST: ${ALETHEIA_LOCAL_MODEL_EXECUTABLE_ALLOWLIST:-}
      ALETHEIA_LOCAL_MODEL_ENV_ALLOWLIST: ${ALETHEIA_LOCAL_MODEL_ENV_ALLOWLIST:-}
      ALETHEIA_DURABLE_WORKER_POLL_MS: ${ALETHEIA_DURABLE_WORKER_POLL_MS:-500}
      ALETHEIA_DURABLE_WORKER_HEARTBEAT_MS: ${ALETHEIA_DURABLE_WORKER_HEARTBEAT_MS:-1000}
      ALETHEIA_DEMO_SEED_ENABLED: ${ALETHEIA_DEMO_SEED_ENABLED:-false}
      ALETHEIA_DEMO_SEED_MODE: ${ALETHEIA_DEMO_SEED_MODE:-empty}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3001}:3001"
    volumes:
      - type: bind
        source: ${ALETHEIA_HOST_DATA_DIR:?Set ALETHEIA_HOST_DATA_DIR to a verified encrypted host directory.}
        target: /data/aletheia
      - type: bind
        source: ${ALETHEIA_HOST_AUDIT_ANCHOR_DIR:?Set ALETHEIA_HOST_AUDIT_ANCHOR_DIR to an independently retained anchor journal directory.}
        target: /audit-anchors/journal
      - type: bind
        source: ${ALETHEIA_HOST_SECRETS_DIR:?Set ALETHEIA_HOST_SECRETS_DIR to the owner-only directory containing Aletheia key files.}
        target: /run/aletheia-secrets
        read_only: true
      - type: bind
        source: ${ALETHEIA_HOST_CLAMAV_DB_DIR:?Set ALETHEIA_HOST_CLAMAV_DB_DIR to a reviewed, current ClamAV definition directory.}
        target: /var/lib/clamav
        read_only: true
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
        NEXT_PUBLIC_ALETHEIA_PRIVATE_AUTH_TOKEN: ${NEXT_PUBLIC_ALETHEIA_PRIVATE_AUTH_TOKEN:-}
    image: aletheia-frontend:local
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
      NEXT_PUBLIC_ALETHEIA_PRIVATE_AUTH_TOKEN: ${NEXT_PUBLIC_ALETHEIA_PRIVATE_AUTH_TOKEN:-}
      NEXT_PUBLIC_ALETHEIA_LOCAL_CLIENT: "true"
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
